<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" role="img" aria-labelledby="title desc">
  <title id="title">Bookstore web app preview</title>
  <desc id="desc">Warm gradient shelf illustration representing a digital bookstore.</desc>
