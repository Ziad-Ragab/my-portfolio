<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" role="img" aria-labelledby="title desc">
  <title id="title">Angular Specialist Certificate</title>
  <desc id="desc">Bold crimson certificate with geometric accents.</desc>
  <defs>
    <linearGradient id="crimson" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf3f3"/>
      <stop offset="1" stop-color="#f6dede"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e63946"/>
      <stop offset="1" stop-color="#a4161a"/>
    </linearGradient>
  </defs>
  <rect width="880" height="620" rx="32" fill="url(#crimson)" stroke="#8c1c1f" stroke-width="4"/>
  <rect x="52" y="52" width="776" height="516" rx="26" fill="#ffffff" stroke="#f0c7c8" stroke-width="2"/>
  <path d="M52 208h776" stroke="#f1d0d0" stroke-width="2"/>
  <path d="M52 476c156-54 310-54 460 0 150 54 216 38 316-28v120H52z" fill="#e63946" opacity="0.12"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" fill="#a4161a" font-weight="700" letter-spacing="0.14em">CERTIFICATE</text>
  <text x="440" y="160" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#b85757" letter-spacing="0.32em">OF EXCELLENCE</text>
  <text x="136" y="238" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#b85757">Presented to</text>
  <text x="136" y="306" font-family="'Playfair Display', 'Times New Roman', serif" font-size="54" fill="#a4161a">Ziad Ragab</text>
  <text x="136" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#b85757">For demonstrating mastery of Angular architecture, RxJS patterns,</text>
  <text x="136" y="388" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#b85757">state management, and enterprise-scale front-end delivery.</text>
  <g transform="translate(136 438)">
    <line x1="0" y1="0" x2="220" y2="0" stroke="#d89a9f" stroke-width="2" stroke-dasharray="6 8"/>
    <text x="110" y="38" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#b85757">Technical Director</text>
  </g>
  <g transform="translate(520 420)">
    <path d="M0 0h240l-60 156H60z" fill="url(#band)" opacity="0.92"/>
    <rect x="42" y="32" width="156" height="92" rx="12" fill="#ffffff"/>
    <text x="120" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="44" fill="#e63946" font-weight="700">ANGULAR</text>
    <text x="120" y="112" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#b85757">SPECIALIST</text>
  </g>
</svg>
